# Railway/Nixpacks: Python + Node app (FastAPI + React).
# Ensures both Python and Node are available and build/start run correctly.
providers = ["python", "node"]

[phases.build]
cmds = ["pip install -e .", "npm ci", "npm run build"]

[start]
cmd = "uvicorn autoapply.server:app --host 0.0.0.0 --port $PORT"
